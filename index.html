<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stretching Timer</title>
  <!-- Google Fonts & Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <!-- PWA Manifest & Themes -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
  <div id="app">
    <!-- 1. 메인 홈 화면 (목록) -->
    <section id="home-view" class="view active">
      <header class="app-header">
        <div class="logo-area">
          <span class="material-symbols-outlined logo-icon">accessibility_new</span>
          <h1>Stretching Timer</h1>
        </div>
        <button id="go-add-btn" class="icon-btn" aria-label="스트레칭 추가">
          <span class="material-symbols-outlined">add</span>
        </button>
      </header>
      
      <main class="view-content">
        <div id="empty-state" class="empty-state">
          <span class="material-symbols-outlined state-icon">timer</span>
          <p>등록된 스트레칭이 없습니다.</p>
          <p class="subtitle">우측 상단 + 버튼 또는 유튜브 앱에서 공유하여 스트레칭을 추가해 보세요!</p>
        </div>
        
        <div id="routine-list" class="routine-list hidden">
          <!-- 스트레칭 카드가 여기에 동적으로 삽입됨 -->
        </div>
      </main>

      <footer class="app-footer">
        <button id="start-routine-btn" class="primary-btn hidden">
          <span class="material-symbols-outlined">play_arrow</span>
          루틴 시작하기
        </button>
      </footer>
    </section>

    <!-- 2. 스트레칭 등록/편집 화면 -->
    <section id="add-view" class="view">
      <header class="app-header">
        <button id="cancel-add-btn" class="icon-btn" aria-label="뒤로가기">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <h2 id="add-view-title">새 스트레칭 추가</h2>
        <div style="width: 40px;"></div> <!-- 정렬용 여백 -->
      </header>

      <main class="view-content">
        <form id="workout-form" class="form-container">
          <input type="hidden" id="edit-id">
          
          <div class="form-group">
            <label for="youtube-url">유튜브 URL</label>
            <div class="input-with-action">
              <input type="url" id="youtube-url" placeholder="https://youtu.be/... 또는 공유 받은 링크" required autocomplete="off">
              <button type="button" id="preview-url-btn" class="secondary-btn">불러오기</button>
            </div>
          </div>

          <div id="video-preview-card" class="video-preview-card hidden">
            <img id="video-thumbnail" src="" alt="유튜브 썸네일">
            <div class="preview-info">
              <span id="preview-title" class="preview-title">유튜브 영상을 찾을 수 없습니다.</span>
            </div>
          </div>

          <div class="form-group">
            <label for="workout-title">스트레칭 이름</label>
            <input type="text" id="workout-title" placeholder="예: 햄스트링 고관절 스트레칭" required autocomplete="off">
          </div>

          <div class="form-group">
            <label for="workout-duration">시간 설정 (초)</label>
            <div class="duration-slider-container">
              <input type="range" id="workout-duration" min="10" max="300" step="5" value="60">
              <div class="duration-display">
                <span id="duration-val">60</span>초
                <span class="duration-minmax">(1분 00초)</span>
              </div>
            </div>
          </div>

          <button type="submit" id="save-workout-btn" class="primary-btn submit-btn">저장하기</button>
        </form>
      </main>
    </section>

    <!-- 3. 루틴 플레이어 화면 -->
    <section id="player-view" class="view">
      <header class="app-header">
        <button id="exit-player-btn" class="icon-btn" aria-label="홈으로 이동">
          <span class="material-symbols-outlined">home</span>
        </button>
        <div class="player-progress-header">
          <span id="current-index-label">1/3</span>
          <span id="current-workout-title" class="title-ellipsis">스트레칭 동작</span>
        </div>
        <div style="width: 40px;"></div> <!-- 정렬용 여백 -->
      </header>

      <main class="view-content player-content">
        <!-- 상단: 유튜브 플레이어 (16:9 비율) -->
        <div class="video-area">
          <iframe id="youtube-player" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>

        <!-- 하단: 타이머 및 제어 -->
        <div class="timer-area">
          <!-- 원형 타이머 UI -->
          <div class="timer-ring-container">
            <svg class="timer-svg" viewBox="0 0 200 200">
              <circle class="timer-track" cx="100" cy="100" r="85"></circle>
              <circle id="timer-progress" class="timer-fill" cx="100" cy="100" r="85"></circle>
            </svg>
            <div class="timer-center-text">
              <span id="timer-time">01:00</span>
            </div>
          </div>

          <!-- 타이머 수동 제어 버튼 -->
          <div class="timer-controls">
            <button id="timer-reset-btn" class="circle-btn secondary" aria-label="다시 시작">
              <span class="material-symbols-outlined">replay</span>
            </button>
            <button id="timer-play-btn" class="circle-btn primary" aria-label="시작">
              <span class="material-symbols-outlined" id="play-icon">play_arrow</span>
            </button>
          </div>
        </div>
      </main>

      <footer class="player-footer">
        <button id="prev-workout-btn" class="text-btn">
          <span class="material-symbols-outlined">navigate_before</span>
          이전 동작
        </button>
        <button id="next-workout-btn" class="primary-btn">
          <span>다음 동작</span>
          <span class="material-symbols-outlined">navigate_next</span>
        </button>
      </footer>
    </section>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
